<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Routes Dashboard</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:20px;line-height:1.6}
.card{background:#1e293b;padding:20px;border-radius:12px;max-width:1000px;margin:auto}
input,button{padding:10px;border-radius:8px;border:none}
button{background:#22c55e;color:#fff;cursor:pointer;margin-top:15px}
table{width:100%;border-collapse:collapse;margin-top:20px}
td,th{padding:10px;border-bottom:1px solid #334155}
.progress{height:16px;background:#334155;border-radius:999px;overflow:hidden}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#38bdf8)}
</style>
</head>
<body>
<div class="card">
<h1>🧭 Life Routes Dashboard</h1>
<p>Allocate each paycheck toward meaningful goals.</p>
<label>Paycheck ($)</label><br>
<input type="number" id="paycheck" placeholder="1000">

<table>
<tr><th>Goal</th><th>%</th><th>Progress</th></tr>

<script>
const goals=[
["vehicle","🚗 Vehicle",20],
["emergency","🛡 Emergency",20],
["school","🎓 School",15],
["furniture","🛋 Furniture",10],
["entertainment","🎮 Entertainment",10],
["business","💼 Business",15],
["home","🏠 Home",5],
["retirement","🌴 Retirement",5]
];
document.write(goals.map(g=>`
<tr>
<td>${g[1]}</td>
<td><input type="number" id="${g[0]}Pct" value="${g[2]}" style="width:70px"></td>
<td>
<div class="progress"><div class="progress-bar" id="${g[0]}Bar"></div></div>
<span id="${g[0]}Amount">$0.00</span>
</td>
</tr>`).join(""));
</script>
</table>

<button onclick="calculateRoutes()">Calculate My Route</button>
<h3 id="remaining"></h3>
</div>

<script>
function calculateRoutes(){
const paycheck=Number(document.getElementById("paycheck").value)||0;
const goals=["vehicle","emergency","school","furniture","entertainment","business","home","retirement"];
let allocated=0;
goals.forEach(id=>{
 const pct=Number(document.getElementById(id+"Pct").value)||0;
 const amount=paycheck*pct/100;
 allocated+=amount;
 document.getElementById(id+"Amount").textContent="$"+amount.toFixed(2);
 document.getElementById(id+"Bar").style.width=Math.min(pct,100)+"%";
});
document.getElementById("remaining").textContent="Unallocated: $"+(paycheck-allocated).toFixed(2);
}
</script>
</body>
</html>
